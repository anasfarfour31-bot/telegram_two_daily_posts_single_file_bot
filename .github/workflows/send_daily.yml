name: Send two daily Telegram posts

on:
  schedule:
    # 05:00 UTC = 08:00 Turkey / Saudi time.
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Send two posts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POSTS_PER_RUN: "2"
        run: python send_post.py

      - name: Save next post number
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json
          git commit -m "Update next Telegram posts" || echo "No changes to commit"
          git push
